<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark theme favicon: dark background + light bars. Matches the
       dark UI palette so the tab icon reads as a "dark badge" next
       to a dark app. Swapped via the rel="icon" link in JS when
       LocalThemeProvider flips the app theme to dark. -->
  <rect fill="#0a0a0a" width="32" height="32" rx="7"/>
  <rect fill="#fafafa" x="7"  y="18" width="4" height="8"  rx="1"/>
  <rect fill="#fafafa" x="14" y="12" width="4" height="14" rx="1"/>
  <rect fill="#fafafa" x="21" y="6"  width="4" height="20" rx="1"/>
</svg>
