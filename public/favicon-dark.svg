<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark theme favicon: light background + dark bars. Matches the
       dark UI palette (bg ≈ neutral-950, fg ≈ neutral-50). Used inside
       the app shell when LocalThemeProvider sets the app theme to
       dark, swapped via the rel="icon" link in JS. -->
  <rect fill="#fafafa" width="32" height="32" rx="7"/>
  <rect fill="#0a0a0a" x="7"  y="18" width="4" height="8"  rx="1"/>
  <rect fill="#0a0a0a" x="14" y="12" width="4" height="14" rx="1"/>
  <rect fill="#0a0a0a" x="21" y="6"  width="4" height="20" rx="1"/>
</svg>
