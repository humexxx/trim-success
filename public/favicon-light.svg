<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Light theme favicon: light background + dark bars. Matches the
       light UI palette so the tab icon reads as a "light badge" next
       to a light app. Swapped via the rel="icon" link in JS when
       LocalThemeProvider flips the app theme to light. -->
  <rect fill="#fafafa" width="32" height="32" rx="7"/>
  <rect fill="#0a0a0a" x="7"  y="18" width="4" height="8"  rx="1"/>
  <rect fill="#0a0a0a" x="14" y="12" width="4" height="14" rx="1"/>
  <rect fill="#0a0a0a" x="21" y="6"  width="4" height="20" rx="1"/>
</svg>
