<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Light theme favicon: dark slate background + light bars. Matches
       the light UI palette (bg ≈ neutral-50, fg ≈ neutral-950). Used
       inside the app shell when LocalThemeProvider sets the app theme
       to light, swapped via the rel="icon" link in JS. -->
  <rect fill="#0a0a0a" width="32" height="32" rx="7"/>
  <rect fill="#fafafa" x="7"  y="18" width="4" height="8"  rx="1"/>
  <rect fill="#fafafa" x="14" y="12" width="4" height="14" rx="1"/>
  <rect fill="#fafafa" x="21" y="6"  width="4" height="20" rx="1"/>
</svg>
